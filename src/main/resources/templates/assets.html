<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>资产配置 - 资产管理助手</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f9fa;
        }
        .sidebar {
            background-color: #343a40;
            color: white;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            width: 200px;
            padding-top: 20px;
        }
        .sidebar a {
            color: white;
            padding: 10px 15px;
            display: block;
            text-decoration: none;
        }
        .sidebar a:hover {
            background-color: #495057;
        }
        .content {
            margin-left: 200px;
            padding: 20px;
        }
        .card {
            margin-bottom: 20px;
        }
        .positive {
            color: green;
        }
        .negative {
            color: red;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h4 class="text-center mb-4">资产管理助手</h4>
        <a href="/dashboard">仪表盘</a>
        <a href="/assets">资产配置</a>
        <a href="/dca">定投计划</a>
    <a href="/goals">投资目标</a>
        <a href="/stocks">股票/基金</a>
        <a href="/news">新闻资讯</a>
        <a href="/ai-advice">AI投资建议</a>
    <a href="/portfolio-advice">投资组合建议</a>
        <a href="/logout">退出登录</a>
    </div>

    <div class="content">
        <h1>资产配置</h1>
        
        <div class="mb-3">
            <a href="/assets/add" class="btn btn-primary">添加资产</a>
        </div>
        
        <!-- 资产概览 -->
        <div class="card">
            <div class="card-header">
                <h2>资产概览</h2>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-4">
                        <h3>总资产价值</h3>
                        <p class="display-4" th:text="${totalValue}">0</p>
                    </div>
                    <div class="col-md-4">
                        <h3>总收益</h3>
                        <p class="display-4" th:class="${totalReturn >= 0 ? 'positive' : 'negative'}" th:text="${totalReturn}">0</p>
                    </div>
                    <div class="col-md-4">
                        <h3>资产配置</h3>
                        <canvas id="assetAllocationChart" width="400" height="200"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <!-- 资产明细 -->
        <div class="card">
            <div class="card-header">
                <h2>资产明细</h2>
            </div>
            <div class="card-body">
                <table class="table">
                    <thead>
                        <tr>
                            <th>类型</th>
                            <th>名称</th>
                            <th>代码</th>
                            <th>持有数量</th>
                            <th>成本均价</th>
                            <th>当前价格</th>
                            <th>总价值</th>
                            <th>收益</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="asset : ${assets}">
                            <td th:text="${asset.type}"></td>
                            <td th:text="${asset.name}"></td>
                            <td th:text="${asset.code}"></td>
                            <td th:text="${asset.amount}"></td>
                            <td th:text="${asset.purchasePrice}"></td>
                            <td th:text="${asset.currentPrice}"></td>
                            <td th:text="${asset.totalValue}"></td>
                            <td th:class="${asset.totalValue.subtract(asset.amount.multiply(asset.purchasePrice)) >= 0 ? 'positive' : 'negative'}" th:text="${asset.totalValue.subtract(asset.amount.multiply(asset.purchasePrice))}"></td>
                            <td>
                                <a th:href="@{/assets/{id}/trades(id=${asset.id})}" class="btn btn-sm btn-outline-primary">📋 交易记录</a>
                                <a th:href="@{/assets/{id}/buy(id=${asset.id})}" class="btn btn-sm btn-danger">买入</a>
                                <a th:href="@{/assets/{id}/sell(id=${asset.id})}" class="btn btn-sm btn-success">卖出</a>
                                <a th:href="@{/assets/edit/{id}(id=${asset.id})}" class="btn btn-sm btn-secondary">编辑</a>
                                <a th:href="@{/assets/delete/{id}(id=${asset.id})}" class="btn btn-sm btn-outline-danger" onclick="return confirm('确定要删除吗？')">删除</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        // 资产配置饼图
        const ctx = document.getElementById('assetAllocationChart').getContext('2d');
        const allocationData = {
            labels: [[${allocation.keySet()}]],
            datasets: [{
                data: [[${allocation.values()}]],
                backgroundColor: ['#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', '#9966FF']
            }]
        };
        new Chart(ctx, {
            type: 'pie',
            data: allocationData,
            options: {
                responsive: true
            }
        });
    </script>
</body>
</html>
