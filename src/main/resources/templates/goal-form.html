<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>新建投资目标</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { background-color: #343a40; color: white; height: 100vh; position: fixed; top: 0; left: 0; width: 210px; padding-top: 20px; }
        .sidebar a { color: white; padding: 10px 15px; display: block; text-decoration: none; }
        .sidebar a:hover { background-color: #495057; }
        .sidebar a.active { background-color: #0d6efd; }
        .content { margin-left: 210px; padding: 24px; max-width: 700px; }
    </style>
</head>
<body>
<div class="sidebar">
    <h5 class="text-center mb-4">资产管理助手</h5>
    <a href="/dashboard">仪表盘</a>
    <a href="/assets">资产配置</a>
    <a href="/dca">定投计划</a>
    <a href="/goals" class="active">投资目标</a>
    <a href="/stocks">股票/基金</a>
    <a href="/warnings">预警管理</a>
    <a href="/news">财经新闻</a>
    <a href="/ai-advice">AI投资建议</a>
    <a href="/portfolio-advice">投资组合建议</a>
    <a href="/logout">退出登录</a>
</div>
<div class="content">
    <h4 class="mb-4">新建投资目标</h4>
    <div class="card shadow-sm">
        <div class="card-body">
            <form method="post" action="/goals/add">
                <div class="mb-3">
                    <label class="form-label">目标名称</label>
                    <input type="text" name="goalName" class="form-control" placeholder="如：退休金、买房首付、子女教育" required>
                </div>
                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label class="form-label">目标金额（元）</label>
                        <input type="number" name="targetAmount" class="form-control" min="1" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">目标达成日期</label>
                        <input type="date" name="targetDate" class="form-control" required>
                    </div>
                </div>
                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label class="form-label">风险等级</label>
                        <select name="riskLevel" class="form-select" required>
                            <option value="CONSERVATIVE">保守型（债券/货币基金为主）</option>
                            <option value="BALANCED" selected>稳健型（股债均衡）</option>
                            <option value="AGGRESSIVE">激进型（股票为主）</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">优先级</label>
                        <select name="priority" class="form-select" required>
                            <option value="1">1 - 最高优先</option>
                            <option value="2" selected>2 - 高</option>
                            <option value="3">3 - 中</option>
                            <option value="4">4 - 低</option>
                        </select>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">备注（可选）</label>
                    <textarea name="notes" class="form-control" rows="2"></textarea>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">创建目标</button>
                    <a href="/goals" class="btn btn-outline-secondary">取消</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
