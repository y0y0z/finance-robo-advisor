<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑警告 - 资产管理助手</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f9fa;
        }
        .sidebar {
            background-color: #343a40;
            color: white;
            min-height: 100vh;
        }
        .sidebar a {
            color: white;
            text-decoration: none;
            display: block;
            padding: 10px 15px;
        }
        .sidebar a:hover {
            background-color: #495057;
        }
        .sidebar .active {
            background-color: #007bff;
        }
        .content {
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- 侧边栏 -->
            <div class="col-md-3 sidebar">
                <h3 class="p-3">资产管理助手</h3>
                <div>
                    <a href="/dashboard">仪表盘</a>
                    <a href="/assets">资产配置</a>
                    <a href="/dca">定投计划</a>
    <a href="/goals">投资目标</a>
                    <a href="/stocks">股票/基金</a>
                    <a href="/warnings" class="active">警告管理</a>
                    <a href="/logout">退出登录</a>
                </div>
            </div>
            
            <!-- 主内容 -->
            <div class="col-md-9 content">
                <div class="mt-4">
                    <h2>编辑警告</h2>
                    <div class="card">
                        <div class="card-body">
                            <form th:action="@{/warnings/edit/{id}(id=${warning.id})}" method="post">
                                <div class="mb-3">
                                    <label for="type" class="form-label">类型</label>
                                    <select class="form-select" id="type" name="type" required>
                                        <option value="股票" th:selected="${warning.type == '股票'}">股票</option>
                                        <option value="基金" th:selected="${warning.type == '基金'}">基金</option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label for="name" class="form-label">名称</label>
                                    <input type="text" class="form-control" id="name" name="name" th:value="${warning.name}" required>
                                </div>
                                <div class="mb-3">
                                    <label for="code" class="form-label">代码</label>
                                    <input type="text" class="form-control" id="code" name="code" th:value="${warning.code}" required>
                                </div>
                                <div class="mb-3">
                                    <label for="warningPoint" class="form-label">警告点数</label>
                                    <input type="number" step="0.01" class="form-control" id="warningPoint" name="warningPoint" th:value="${warning.warningPoint}" required>
                                </div>
                                <div class="mb-3">
                                    <label for="meaning" class="form-label">具体含义</label>
                                    <input type="text" class="form-control" id="meaning" name="meaning" th:value="${warning.meaning}" required>
                                </div>
                                <div class="mb-3">
                                    <label for="stopProfitPoint" class="form-label">
                                        止盈价格线 <span style="font-size:0.72rem;color:#6c757d;border:1px solid #dee2e6;border-radius:4px;padding:1px 5px;margin-left:4px;">可选</span>
                                    </label>
                                    <input type="number" step="0.001" class="form-control" id="stopProfitPoint" name="stopProfitPoint" th:value="${warning.stopProfitPoint}">
                                </div>
                                <div class="mb-3">
                                    <label for="stopLossPoint" class="form-label">
                                        止损价格线 <span style="font-size:0.72rem;color:#6c757d;border:1px solid #dee2e6;border-radius:4px;padding:1px 5px;margin-left:4px;">可选</span>
                                    </label>
                                    <input type="number" step="0.001" class="form-control" id="stopLossPoint" name="stopLossPoint" th:value="${warning.stopLossPoint}">
                                </div>
                                <button type="submit" class="btn btn-primary">保存</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
