<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>轻量级智能量化与资产管理助手</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f9fa;
        }
        .sidebar {
            background-color: #343a40;
            color: white;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            width: 200px;
            padding-top: 20px;
        }
        .sidebar a {
            color: white;
            padding: 10px 15px;
            display: block;
            text-decoration: none;
        }
        .sidebar a:hover {
            background-color: #495057;
        }
        .content {
            margin-left: 200px;
            padding: 20px;
        }
        .card {
            margin-bottom: 20px;
        }
        .positive {
            color: green;
        }
        .negative {
            color: red;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h4 class="text-center mb-4">资产管理助手</h4>
        <a href="/">首页</a>
        <a href="/assets">资产配置</a>
        <a href="/stocks">股票/基金</a>
        <a href="/news">新闻资讯</a>
        <a href="/ai-advice">AI投资建议</a>
    </div>

    <div class="content">
        <h1>轻量级智能量化与资产管理助手</h1>
        
        <!-- 资产配置概览 -->
        <div class="card">
            <div class="card-header">
                <h2>资产配置概览</h2>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-4">
                        <h3>总资产价值</h3>
                        <p class="display-4" th:text="${totalValue}">0</p>
                    </div>
                    <div class="col-md-4">
                        <h3>总收益</h3>
                        <p class="display-4" th:class="${totalReturn >= 0 ? 'positive' : 'negative'}" th:text="${totalReturn}">0</p>
                    </div>
                    <div class="col-md-4">
                        <h3>资产配置</h3>
                        <canvas id="assetAllocationChart" width="400" height="200"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <!-- 股票/基金概览 -->
        <div class="card">
            <div class="card-header">
                <h2>股票/基金概览</h2>
            </div>
            <div class="card-body">
                <table class="table">
                    <thead>
                        <tr>
                            <th>代码</th>
                            <th>名称</th>
                            <th>类型</th>
                            <th>价格</th>
                            <th>涨跌幅</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="stock : ${stocks.values()}">
                            <td th:text="${stock.code}"></td>
                            <td th:text="${stock.name}"></td>
                            <td th:text="${stock.type}"></td>
                            <td th:text="${stock.price}"></td>
                            <td th:class="${stock.changePercent >= 0 ? 'positive' : 'negative'}" th:text="${stock.changePercent}%"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 新闻资讯 -->
        <div class="card">
            <div class="card-header">
                <h2>新闻资讯</h2>
            </div>
            <div class="card-body">
                <div th:each="news : ${news}">
                    <h4><a th:href="${news.url}" th:text="${news.title}"></a></h4>
                    <p th:text="${news.content}"></p>
                    <p class="text-muted">来源: <span th:text="${news.source}"></span> | 时间: <span th:text="${news.publishTime}"></span></p>
                    <hr>
                </div>
            </div>
        </div>

        <!-- AI投资建议 -->
        <div class="card">
            <div class="card-header">
                <h2>AI投资建议</h2>
            </div>
            <div class="card-body" th:utext="${#strings.replace(aiAdvice, '\n', '<br>')}"></div>
        </div>

        <!-- 警告信息 -->
        <div class="card" th:if="${warnings.size() > 0}">
            <div class="card-header bg-danger text-white">
                <h2>警告信息</h2>
            </div>
            <div class="card-body">
                <ul>
                    <li th:each="warning : ${warnings}" th:text="${warning}"></li>
                </ul>
            </div>
        </div>
    </div>

    <script>
        // 资产配置饼图
        const ctx = document.getElementById('assetAllocationChart').getContext('2d');
        const allocationData = {
            labels: [[${#strings.listJoin(allocation.keySet(), "'", "', '")}]],
            datasets: [{
                data: [[${#strings.listJoin(allocation.values(), '', ', ')}]],
                backgroundColor: ['#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', '#9966FF']
            }]
        };
        new Chart(ctx, {
            type: 'pie',
            data: allocationData,
            options: {
                responsive: true
            }
        });
    </script>
</body>
</html>
