<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑股票/基金 - 资产管理助手</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f9fa;
        }
        .sidebar {
            background-color: #343a40;
            color: white;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            width: 200px;
            padding-top: 20px;
        }
        .sidebar a {
            color: white;
            padding: 10px 15px;
            display: block;
            text-decoration: none;
        }
        .sidebar a:hover {
            background-color: #495057;
        }
        .content {
            margin-left: 200px;
            padding: 20px;
        }
        .card {
            margin-bottom: 20px;
        }
        .card-header {
            background-color: #007bff;
            color: white;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h4 class="text-center mb-4">资产管理助手</h4>
        <a href="/dashboard">仪表盘</a>
        <a href="/assets">资产配置</a>
        <a href="/dca">定投计划</a>
    <a href="/goals">投资目标</a>
        <a href="/stocks">股票/基金</a>
        <a href="/news">新闻资讯</a>
        <a href="/ai-advice">AI投资建议</a>
    <a href="/portfolio-advice">投资组合建议</a>
        <a href="/logout">退出登录</a>
    </div>

    <div class="content">
        <h1>编辑股票/基金</h1>
        
        <div class="card">
            <div class="card-header">
                <h3>编辑关注的股票/基金</h3>
            </div>
            <div class="card-body">
                <form th:action="@{/stocks/edit/{id}(id=${stock.id})}" method="post">
                    <div class="mb-3">
                        <label for="code" class="form-label">代码</label>
                        <input type="text" class="form-control" id="code" name="code" th:value="${stock.code}" required>
                    </div>
                    <div class="mb-3">
                        <label for="name" class="form-label">名称</label>
                        <input type="text" class="form-control" id="name" name="name" th:value="${stock.name}" required>
                    </div>
                    <div class="mb-3">
                        <label for="type" class="form-label">类型</label>
                        <select class="form-select" id="type" name="type" required>
                            <option th:value="'股票'" th:selected="${stock.type == '股票'}">股票</option>
                            <option th:value="'基金'" th:selected="${stock.type == '基金'}">基金</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="price" class="form-label">价格</label>
                        <input type="number" step="0.01" class="form-control" id="price" name="price" th:value="${stock.price}" required>
                    </div>
                    <div class="mb-3">
                        <label for="priceChange" class="form-label">涨跌额</label>
                        <input type="number" step="0.01" class="form-control" id="priceChange" name="priceChange" th:value="${stock.priceChange}" required>
                    </div>
                    <div class="mb-3">
                        <label for="changePercent" class="form-label">涨跌幅</label>
                        <input type="number" step="0.01" class="form-control" id="changePercent" name="changePercent" th:value="${stock.changePercent}" required>
                    </div>
                    <div class="mb-3">
                        <label for="market" class="form-label">市场</label>
                        <input type="text" class="form-control" id="market" name="market" th:value="${stock.market}" required>
                    </div>
                    <div class="mb-3">
                        <label for="pe" class="form-label">市盈率</label>
                        <input type="number" step="0.01" class="form-control" id="pe" name="pe" th:value="${stock.pe}">
                    </div>
                    <div class="mb-3">
                        <label for="pb" class="form-label">市净率</label>
                        <input type="number" step="0.01" class="form-control" id="pb" name="pb" th:value="${stock.pb}">
                    </div>
                    <div class="mb-3">
                        <label for="nav" class="form-label">净值</label>
                        <input type="number" step="0.01" class="form-control" id="nav" name="nav" th:value="${stock.nav}">
                    </div>
                    <button type="submit" class="btn btn-primary">保存</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
