<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>投资风险画像 - 资产管理助手</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f8f9fa; font-family: Arial, sans-serif; }
        .sidebar { background-color: #343a40; color: white; height: 100vh; position: fixed; top: 0; left: 0; width: 210px; padding-top: 20px; }
        .sidebar a { color: white; padding: 10px 15px; display: block; text-decoration: none; }
        .sidebar a:hover { background-color: #495057; }
        .sidebar a.active { background-color: #0d6efd; }
        .content { margin-left: 210px; padding: 32px; }
        .section-title { font-size: 14px; color: #666; border-bottom: 1px solid #eee; padding-bottom: 8px; margin: 20px 0 16px; font-weight: 600; }
    </style>
</head>
<body>
<div class="sidebar">
    <h5 class="text-center mb-4">资产管理助手</h5>
    <a href="/dashboard">仪表盘</a>
    <a href="/assets">资产配置</a>
    <a href="/dca">定投计划</a>
    <a href="/goals">投资目标</a>
    <a href="/stocks">股票/基金</a>
    <a href="/warnings">预警管理</a>
    <a href="/news">财经新闻</a>
    <a href="/ai-advice">AI投资建议</a>
    <a href="/portfolio-advice">投资组合建议</a>
    <a href="/logout">退出登录</a>
</div>

<div class="content">
    <h4 class="mb-1">投资风险画像</h4>
    <p class="text-muted mb-4">填写以下信息，系统将根据您的情况生成个性化投资建议</p>

    <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>

    <form method="post" action="/profile/setup">
        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <div class="section-title">基本信息</div>
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label">年龄</label>
                        <input type="number" name="age" class="form-control" min="18" max="100" required
                               th:value="${profile?.age}">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">年收入（元）</label>
                        <input type="number" name="annualIncome" class="form-control" min="0" required
                               th:value="${profile?.annualIncome}">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">月结余（元）</label>
                        <input type="number" name="monthlySavings" class="form-control" min="0" required
                               th:value="${profile?.monthlySavings}">
                    </div>
                </div>

                <div class="section-title">投资偏好</div>
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label">投资经验</label>
                        <select name="investmentExperience" class="form-select" required>
                            <option value="NONE"         th:selected="${profile?.investmentExperience == 'NONE'}">无经验</option>
                            <option value="BEGINNER"     th:selected="${profile?.investmentExperience == 'BEGINNER'}">初级（&lt;2年）</option>
                            <option value="INTERMEDIATE" th:selected="${profile?.investmentExperience == 'INTERMEDIATE'}">中级（2-5年）</option>
                            <option value="EXPERT"       th:selected="${profile?.investmentExperience == 'EXPERT'}">专家（&gt;5年）</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">投资目标</label>
                        <select name="investmentGoal" class="form-select" required>
                            <option value="PRESERVATION"  th:selected="${profile?.investmentGoal == 'PRESERVATION'}">资产保值</option>
                            <option value="INCOME"        th:selected="${profile?.investmentGoal == 'INCOME'}">稳定收益</option>
                            <option value="WEALTH_GROWTH" th:selected="${profile?.investmentGoal == 'WEALTH_GROWTH'}">财富增值</option>
                            <option value="SPECULATION"   th:selected="${profile?.investmentGoal == 'SPECULATION'}">高风险投机</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">投资期限</label>
                        <select name="investmentHorizon" class="form-select" required>
                            <option value="SHORT"  th:selected="${profile?.investmentHorizon == 'SHORT'}">短期（&lt;1年）</option>
                            <option value="MEDIUM" th:selected="${profile?.investmentHorizon == 'MEDIUM'}">中期（1-5年）</option>
                            <option value="LONG"   th:selected="${profile?.investmentHorizon == 'LONG'}">长期（&gt;5年）</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">最大可接受亏损（%）</label>
                        <input type="number" name="maxLossPercent" class="form-control" min="1" max="100" required
                               th:value="${profile?.maxLossPercent ?: 10}">
                        <div class="form-text">例如：10 表示最多接受 10% 亏损</div>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">流动性需求</label>
                        <select name="liquidityNeed" class="form-select" required>
                            <option value="HIGH"   th:selected="${profile?.liquidityNeed == 'HIGH'}">高（随时可能需要用钱）</option>
                            <option value="MEDIUM" th:selected="${profile?.liquidityNeed == 'MEDIUM'}">中（偶尔需要）</option>
                            <option value="LOW"    th:selected="${profile?.liquidityNeed == 'LOW'}">低（长期不动）</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">偏好资产</label>
                        <div class="mt-2">
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="checkbox" name="preferredAssets" value="股票"
                                       th:checked="${profile?.preferredAssets != null and #strings.contains(profile.preferredAssets,'股票')}">
                                <label class="form-check-label">股票</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="checkbox" name="preferredAssets" value="基金"
                                       th:checked="${profile?.preferredAssets != null and #strings.contains(profile.preferredAssets,'基金')}">
                                <label class="form-check-label">基金/ETF</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="checkbox" name="preferredAssets" value="现金"
                                       th:checked="${profile?.preferredAssets != null and #strings.contains(profile.preferredAssets,'现金')}">
                                <label class="form-check-label">现金</label>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <button type="submit" class="btn btn-primary px-5">保存并查看投资组合建议</button>
        <a th:if="${profile != null}" href="/portfolio-advice" class="btn btn-outline-secondary ms-2">取消</a>
    </form>
</div>
</body>
</html>
