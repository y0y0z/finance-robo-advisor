<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>添加股票/基金 - 资产管理助手</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { font-family: Arial, sans-serif; background-color: #f8f9fa; }
        .sidebar {
            background-color: #343a40; color: white;
            height: 100vh; position: fixed;
            top: 0; left: 0; width: 210px; padding-top: 20px;
        }
        .sidebar a { color: white; padding: 10px 15px; display: block; text-decoration: none; }
        .sidebar a:hover { background-color: #495057; }
        .sidebar a.active { background-color: #0d6efd; }
        .content { margin-left: 210px; padding: 30px; }
    </style>
</head>
<body>
<div class="sidebar">
    <h5 class="text-center mb-4">资产管理助手</h5>
    <a href="/dashboard">仪表盘</a>
    <a href="/assets">资产配置</a>
    <a href="/stocks" class="active">股票/基金</a>
    <a href="/warnings">预警管理</a>
    <a href="/news">财经新闻</a>
    <a href="/ai-advice">AI投资建议</a>
    <a href="/portfolio-advice">投资组合建议</a>
    <a href="/logout">退出登录</a>
</div>

<div class="content">
    <div class="d-flex align-items-center mb-4 gap-2">
        <a href="/stocks" class="btn btn-sm btn-outline-secondary">← 返回</a>
        <h4 class="mb-0">添加关注的股票/基金</h4>
    </div>

    <div class="card shadow-sm" style="max-width:480px;">
        <div class="card-body p-4">
            <form th:action="@{/stocks/add}" method="post">

                <div class="mb-3">
                    <label for="code" class="form-label fw-semibold">股票/基金代码</label>
                    <input type="text" class="form-control" id="code" name="code"
                           placeholder="如：600519、09992、AAPL、110011"
                           maxlength="16" autocomplete="off" required>
                </div>

                <div class="mb-3">
                    <label for="name" class="form-label fw-semibold">名称</label>
                    <input type="text" class="form-control" id="name" name="name"
                           placeholder="自动填充或手动输入" required>
                </div>

                <div class="mb-3">
                    <label for="type" class="form-label fw-semibold">类型</label>
                    <select class="form-select" id="type" name="type" required onchange="toggleMarket(this.value)">
                        <option value="股票">股票</option>
                        <option value="基金">基金</option>
                    </select>
                </div>

                <div class="mb-3" id="marketGroup">
                    <label for="market" class="form-label fw-semibold">市场</label>
                    <select class="form-select" id="market" name="market">
                        <option value="AUTO">自动识别</option>
                        <option value="CN_SH">A股-沪市</option>
                        <option value="CN_SZ">A股-深市</option>
                        <option value="HK">港股</option>
                        <option value="US">美股</option>
                    </select>
                    <div class="form-text">港股如 09992，美股如 AAPL；A 股建议选择沪市/深市。</div>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary">保存</button>
                    <a href="/stocks" class="btn btn-outline-secondary">取消</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function toggleMarket(type) {
        document.getElementById('marketGroup').style.display = type === '股票' ? 'block' : 'none';
    }
    toggleMarket(document.getElementById('type').value);
</script>
</body>
</html>
