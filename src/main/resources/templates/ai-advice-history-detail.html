<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI分析详情 - 资产管理助手</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f8f9fa; }
        .sidebar { background-color: #343a40; color: white; min-height: 100vh; }
        .sidebar a { color: white; text-decoration: none; display: block; padding: 10px 15px; }
        .sidebar a:hover { background-color: #495057; }
        .sidebar .active { background-color: #007bff; }
        .content { padding: 20px; }

        .type-badge {
            font-size: 0.75rem;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 600;
        }
        .type-PORTFOLIO      { background: #dbeafe; color: #1d4ed8; }
        .type-STOCK          { background: #d1fae5; color: #065f46; }
        .type-NEWS           { background: #fef3c7; color: #92400e; }
        .type-NEWS_KEYWORD   { background: #ede9fe; color: #5b21b6; }

        /* Markdown 渲染区域 */
        #mdContent { background: #fff; border-radius: 10px; padding: 28px 32px; }
        #mdContent h1, #mdContent h2, #mdContent h3 { color: #1e3a5f; }
        #mdContent table { width: 100%; border-collapse: collapse; margin: 12px 0; }
        #mdContent th { background: #f1f5f9; padding: 8px 12px; text-align: left; font-size: 0.88rem; }
        #mdContent td { padding: 7px 12px; border-bottom: 1px solid #e9ecef; font-size: 0.88rem; }
        #mdContent blockquote { border-left: 4px solid #93c5fd; padding-left: 14px; color: #374151; background: #eff6ff; border-radius: 0 6px 6px 0; margin: 10px 0; }
        #mdContent code { background: #f3f4f6; padding: 2px 6px; border-radius: 4px; font-size: 0.85em; }
        #mdContent pre { background: #1e293b; color: #e2e8f0; padding: 16px; border-radius: 8px; overflow-x: auto; }

        /* 风险仪表盘 */
        .risk-dashboard { background: #fff; border-radius: 10px; padding: 20px 24px; margin-bottom: 20px; border: 1px solid #e9ecef; }
        .gauge-container { position: relative; width: 160px; height: 85px; margin: 0 auto 8px; }
        .gauge-bg { width: 160px; height: 80px; border-radius: 80px 80px 0 0; overflow: hidden; }
        .gauge-arc { width: 160px; height: 160px; border-radius: 50%; background: conic-gradient(#22c55e 0deg 60deg, #eab308 60deg 120deg, #ef4444 120deg 180deg, transparent 180deg 360deg); margin-top: -80px; }
        .gauge-cover { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 110px; height: 55px; background: #fff; border-radius: 55px 55px 0 0; }
        .gauge-needle { position: absolute; bottom: 0; left: 50%; width: 2px; height: 68px; background: #374151; transform-origin: bottom center; border-radius: 2px 2px 0 0; }
        .gauge-score { position: absolute; bottom: -6px; left: 50%; transform: translateX(-50%); font-size: 1.3rem; font-weight: 700; color: #1e293b; }
        .rv-low  { background: #d1fae5; color: #065f46; }
        .rv-mid  { background: #fef3c7; color: #92400e; }
        .rv-high { background: #fee2e2; color: #991b1b; }

        .meta-bar { background: #f8fafc; border-radius: 8px; padding: 12px 20px; margin-bottom: 20px; font-size: 0.85rem; color: #6c757d; }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <!-- 侧边栏 -->
        <div class="col-md-2 sidebar">
            <h5 class="p-3">资产管理助手</h5>
            <a href="/dashboard">仪表盘</a>
            <a href="/assets">资产配置</a>
            <a href="/dca">定投计划</a>
    <a href="/goals">投资目标</a>
            <a href="/stocks">股票/基金</a>
            <a href="/warnings">预警管理</a>
            <a href="/news">财经新闻</a>
            <a href="/ai-advice" class="active">AI投资建议</a>
            <a href="/logout">退出登录</a>
        </div>

        <!-- 主内容 -->
        <div class="col-md-10 content">
            <div class="mt-4">
                <!-- 导航 -->
                <div class="mb-3">
                    <a href="/ai-advice/history" class="text-decoration-none text-secondary">← 返回历史列表</a>
                </div>

                <!-- 记录元信息 -->
                <div class="meta-bar d-flex align-items-center gap-3 flex-wrap">
                    <span class="type-badge"
                          th:classappend="'type-' + ${record.type}"
                          th:text="${record.type == 'PORTFOLIO'} ? '整体持仓分析' :
                                   (${record.type == 'STOCK'} ? '单股专项分析' :
                                   (${record.type == 'NEWS'} ? '新闻AI解读' : '关键词情绪汇总'))">
                    </span>
                    <span th:text="${record.subject}" style="font-weight:600;color:#1e293b"></span>
                    <span th:text="'🕐 ' + ${#dates.format(record.createdAt, 'yyyy-MM-dd HH:mm:ss')}"></span>
                    <span th:if="${record.durationMs != null}"
                          th:text="'⏱ 耗时 ' + ${#numbers.formatDecimal(record.durationMs / 1000.0, 1, 1)} + ' 秒'">
                    </span>
                </div>

                <!-- 风险仪表盘（仅 PORTFOLIO 类型显示，JS解析后渲染） -->
                <div class="risk-dashboard" id="riskDashboard" style="display:none">
                    <div class="row align-items-center">
                        <div class="col-auto text-center">
                            <div class="gauge-container">
                                <div class="gauge-bg"><div class="gauge-arc"></div></div>
                                <div class="gauge-cover"></div>
                                <div class="gauge-needle" id="riskNeedle"></div>
                                <div class="gauge-score" id="riskScore">--</div>
                            </div>
                            <div id="riskLevel" class="mt-1" style="font-size:0.9rem;font-weight:600;color:#374151"></div>
                        </div>
                        <div class="col">
                            <div class="mb-2" style="font-weight:600;color:#1e293b">⚠️ <span id="topRisk"></span></div>
                            <div class="d-flex gap-2 flex-wrap mt-2">
                                <span class="badge rounded-pill" id="positionRiskBadge">仓位风险：--</span>
                                <span class="badge rounded-pill" id="concentrationRiskBadge">集中度风险：--</span>
                                <span class="badge rounded-pill" id="marketRiskBadge">市场风险：--</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Markdown 内容 -->
                <div id="mdContent"></div>
            </div>
        </div>
    </div>
</div>

<script th:inline="javascript">
    const rawContent = /*[[${record.content}]]*/ '';
    const recordType = /*[[${record.type}]]*/ '';

    // 提取并移除 JSON block，渲染风险仪表盘
    function renderRisk(raw) {
        const jsonMatch = raw.match(/```json\s*(\{[\s\S]*?\})\s*```/);
        if (!jsonMatch || recordType !== 'PORTFOLIO') return raw;

        try {
            const risk = JSON.parse(jsonMatch[1]);
            document.getElementById('riskDashboard').style.display = 'block';

            const score = risk.riskScore ?? 50;
            document.getElementById('riskScore').textContent = score;
            document.getElementById('riskLevel').textContent = risk.riskLevel ?? '';
            document.getElementById('topRisk').textContent = risk.topRisk ?? '';

            // 旋转指针：score=0 → -90deg，score=100 → 90deg
            const deg = (score / 100) * 180 - 90;
            document.getElementById('riskNeedle').style.transform = `translateX(-50%) rotate(${deg}deg)`;

            // 子风险标签颜色
            const levelClass = { '低': 'rv-low', '中': 'rv-mid', '高': 'rv-high' };
            const badges = [
                { id: 'positionRiskBadge',       label: '仓位风险',   val: risk.positionRisk },
                { id: 'concentrationRiskBadge',  label: '集中度风险', val: risk.concentrationRisk },
                { id: 'marketRiskBadge',          label: '市场风险',   val: risk.marketRisk },
            ];
            badges.forEach(({ id, label, val }) => {
                const el = document.getElementById(id);
                el.textContent = label + '：' + (val ?? '--');
                el.className = 'badge rounded-pill ' + (levelClass[val] ?? 'rv-low');
            });
        } catch (e) { /* JSON 解析失败则不显示仪表盘 */ }

        // 从正文中移除 JSON block
        return raw.replace(/```json[\s\S]*?```/, '').trim();
    }

    const cleaned = renderRisk(rawContent);
    document.getElementById('mdContent').innerHTML = marked.parse(cleaned);
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
