<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑资产 - 资产管理助手</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f9fa;
        }
        .sidebar {
            background-color: #343a40;
            color: white;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            width: 200px;
            padding-top: 20px;
        }
        .sidebar a {
            color: white;
            padding: 10px 15px;
            display: block;
            text-decoration: none;
        }
        .sidebar a:hover {
            background-color: #495057;
        }
        .content {
            margin-left: 200px;
            padding: 20px;
        }
        .card {
            margin-bottom: 20px;
        }
        .card-header {
            background-color: #007bff;
            color: white;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h4 class="text-center mb-4">资产管理助手</h4>
        <a href="/dashboard">仪表盘</a>
        <a href="/assets">资产配置</a>
        <a href="/dca">定投计划</a>
    <a href="/goals">投资目标</a>
        <a href="/stocks">股票/基金</a>
        <a href="/news">新闻资讯</a>
        <a href="/ai-advice">AI投资建议</a>
    <a href="/portfolio-advice">投资组合建议</a>
        <a href="/logout">退出登录</a>
    </div>

    <div class="content">
        <h1>编辑资产</h1>
        
        <div class="card">
            <div class="card-header">
                <h3>编辑资产信息</h3>
            </div>
            <div class="card-body">
                <form th:action="@{/assets/edit/{id}(id=${asset.id})}" method="post">
                    <div class="mb-3">
                        <label for="type" class="form-label">资产类型</label>
                        <select class="form-select" id="type" name="type" required onchange="toggleMarket(this.value)">
                            <option th:value="'股票'" th:selected="${asset.type == '股票'}">股票</option>
                            <option th:value="'基金'" th:selected="${asset.type == '基金'}">基金</option>
                            <option th:value="'现金'" th:selected="${asset.type == '现金'}">现金</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="name" class="form-label">资产名称</label>
                        <input type="text" class="form-control" id="name" name="name" th:value="${asset.name}" required>
                    </div>
                    <div class="mb-3">
                        <label for="code" class="form-label">资产代码</label>
                        <input type="text" class="form-control" id="code" name="code" th:value="${asset.code}" maxlength="16" required>
                    </div>
                    <div class="mb-3" id="marketGroup">
                        <label for="market" class="form-label">市场</label>
                        <select class="form-select" id="market" name="market">
                            <option value="AUTO">自动识别</option>
                            <option value="CN_SH" th:selected="${asset.market == 'CN_SH'}">A股-沪市</option>
                            <option value="CN_SZ" th:selected="${asset.market == 'CN_SZ'}">A股-深市</option>
                            <option value="HK" th:selected="${asset.market == 'HK'}">港股</option>
                            <option value="US" th:selected="${asset.market == 'US'}">美股</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="amount" class="form-label">数量</label>
                        <input type="number" step="0.01" class="form-control" id="amount" name="amount" th:value="${asset.amount}" required>
                    </div>
                    <div class="mb-3">
                        <label for="purchasePrice" class="form-label">购买价格</label>
                        <input type="number" step="0.01" class="form-control" id="purchasePrice" name="purchasePrice" th:value="${asset.purchasePrice}" required>
                    </div>
                    <div class="mb-3">
                        <label for="currentPrice" class="form-label">当前价格</label>
                        <input type="number" step="0.01" class="form-control" id="currentPrice" name="currentPrice" th:value="${asset.currentPrice}" required>
                    </div>
                    <button type="submit" class="btn btn-primary">保存</button>
                </form>
            </div>
        </div>
    </div>
<script>
    function toggleMarket(type) {
        document.getElementById('marketGroup').style.display = type === '股票' ? 'block' : 'none';
    }
    toggleMarket(document.getElementById('type').value);
</script>
</body>
</html>
