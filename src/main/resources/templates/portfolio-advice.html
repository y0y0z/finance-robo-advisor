<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>投资组合建议 - 资产管理助手</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { background-color: #343a40; color: white; height: 100vh; position: fixed; top: 0; left: 0; width: 210px; padding-top: 20px; }
        .sidebar a { color: white; padding: 10px 15px; display: block; text-decoration: none; }
        .sidebar a:hover { background-color: #495057; }
        .sidebar a.active { background-color: #0d6efd; }
        .content { margin-left: 210px; padding: 24px; }
        .score-ring { width: 90px; height: 90px; position: relative; }
        .score-ring svg { width: 100%; height: 100%; }
        .score-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center; line-height: 1.1; }
        .badge-conservative { background: #E3F2FD; color: #1565C0; }
        .badge-balanced     { background: #FFF3E0; color: #E65100; }
        .badge-aggressive   { background: #FFEBEE; color: #C62828; }
    </style>
</head>
<body>
<div class="sidebar">
    <h5 class="text-center mb-4">资产管理助手</h5>
    <a href="/dashboard">仪表盘</a>
    <a href="/assets">资产配置</a>
    <a href="/dca">定投计划</a>
    <a href="/goals">投资目标</a>
    <a href="/stocks">股票/基金</a>
    <a href="/warnings">预警管理</a>
    <a href="/news">财经新闻</a>
    <a href="/ai-advice">AI投资建议</a>
    <a href="/portfolio-advice" class="active">投资组合建议</a>
    <a href="/logout">退出登录</a>
</div>

<div class="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="mb-0">投资组合建议</h4>
        <a href="/profile/setup" class="btn btn-outline-secondary btn-sm">重新评估风险</a>
    </div>

    <!-- Flash 消息：刚完成评估时显示 -->
    <div th:if="${riskScore != null}" class="alert alert-success">
        风险评估完成！您的风险评分为 <strong th:text="${riskScore}"></strong> 分，
        风险等级：<strong th:text="${riskLevel == 'CONSERVATIVE'} ? '保守型' : (${riskLevel == 'BALANCED'} ? '稳健型' : '激进型')"></strong>
    </div>

    <!-- 风险画像卡片 -->
    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <div class="d-flex align-items-center gap-4">
                <!-- SVG 弧形进度条 -->
                <div class="score-ring flex-shrink-0">
                    <svg viewBox="0 0 100 100">
                        <circle cx="50" cy="50" r="42" fill="none" stroke="#eee" stroke-width="10"/>
                        <circle cx="50" cy="50" r="42" fill="none"
                                th:attr="stroke=${profile.riskScore <= 30 ? '#2196F3' : (profile.riskScore <= 70 ? '#FF9800' : '#F44336')},
                                         stroke-dashoffset=${264 - 264 * profile.riskScore / 100}"
                                stroke-width="10" stroke-dasharray="264" stroke-linecap="round"
                                transform="rotate(-90 50 50)"/>
                    </svg>
                    <div class="score-text">
                        <div class="fw-bold fs-5" th:text="${profile.riskScore}"></div>
                        <div class="text-muted" style="font-size:10px">/ 100</div>
                    </div>
                </div>
                <div>
                    <span class="badge fs-6 px-3 py-2 mb-2"
                          th:classappend="${profile.riskLevel == 'CONSERVATIVE'} ? 'badge-conservative' : (${profile.riskLevel == 'BALANCED'} ? 'badge-balanced' : 'badge-aggressive')"
                          th:text="${riskLevelLabel}"></span>
                    <div class="text-muted small d-flex flex-wrap gap-3 mt-1">
                        <span>投资目标：<span th:text="${profile.investmentGoal == 'WEALTH_GROWTH'} ? '财富增值' : (${profile.investmentGoal == 'INCOME'} ? '稳定收益' : (${profile.investmentGoal == 'PRESERVATION'} ? '资产保值' : '高风险投机'))"></span></span>
                        <span>期限：<span th:text="${profile.investmentHorizon == 'LONG'} ? '长期' : (${profile.investmentHorizon == 'MEDIUM'} ? '中期' : '短期')"></span></span>
                        <span>最大亏损：<span th:text="${profile.maxLossPercent} + '%'"></span></span>
                        <span>流动性：<span th:text="${profile.liquidityNeed == 'HIGH'} ? '高' : (${profile.liquidityNeed == 'MEDIUM'} ? '中' : '低')"></span></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 无持仓提示 -->
    <div th:if="${!hasAssets}" class="alert alert-warning">
        您尚未录入持仓数据，当前仓位均为 0%。
        <a href="/assets/init" class="alert-link">立即录入持仓</a>，系统将自动计算调仓建议。
    </div>

    <!-- 仓位对比 -->
    <div class="card shadow-sm mb-4">
        <div class="card-header bg-primary text-white"><strong>目标仓位 vs 当前仓位</strong></div>
        <div class="card-body">
            <canvas id="allocChart" height="80"></canvas>
            <table class="table table-sm mt-3">
                <thead class="table-light">
                    <tr><th>资产类别</th><th>目标占比</th><th>当前占比</th><th>差额</th><th>建议操作</th></tr>
                </thead>
                <tbody>
                    <tr th:each="item : ${allocationComparison}">
                        <td th:text="${item.type}"></td>
                        <td th:text="${item.target} + '%'"></td>
                        <td th:text="${item.current} + '%'"></td>
                        <td th:with="isPositive=${item.delta.compareTo(T(java.math.BigDecimal).ZERO) > 0},
                                     isNegative=${item.delta.compareTo(T(java.math.BigDecimal).ZERO) < 0}"
                            th:classappend="${isPositive} ? 'text-success fw-bold' : (${isNegative} ? 'text-danger fw-bold' : '')"
                            th:text="${isPositive} ? ('+' + ${item.delta} + '%') : (${item.delta} + '%')"></td>
                        <td>
                            <span th:if="${item.delta.compareTo(T(java.math.BigDecimal).ONE) >= 0}"  class="badge bg-success">增加 <span th:text="${item.delta}"></span>%</span>
                            <span th:if="${item.delta.compareTo(T(java.math.BigDecimal).ONE.negate()) <= 0}" class="badge bg-danger">减少 <span th:text="${item.delta.negate()}"></span>%</span>
                            <span th:if="${item.delta.compareTo(T(java.math.BigDecimal).ONE) < 0 and item.delta.compareTo(T(java.math.BigDecimal).ONE.negate()) > 0}" class="badge bg-secondary">已达标</span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- 动态调整说明 -->
    <div class="card shadow-sm mb-4">
        <div class="card-header bg-info text-white"><strong>动态调整因素</strong></div>
        <div class="card-body">
            <div th:each="r : ${adjustmentReasons}" class="d-flex align-items-start gap-2 mb-2">
                <span class="badge bg-light text-dark flex-shrink-0" th:text="${r.category}"></span>
                <span class="small" th:text="${r.detail}"></span>
            </div>
        </div>
    </div>

    <!-- 集中度警告 -->
    <div th:if="${!concentrationWarnings.empty}" class="card shadow-sm mb-4">
        <div class="card-header bg-warning text-dark"><strong>集中度风险警告</strong></div>
        <div class="card-body p-0">
            <div th:each="w : ${concentrationWarnings}"
                 class="alert mb-0 rounded-0 border-0 border-bottom px-4 py-3"
                 th:classappend="${w.severity == 'DANGER'} ? 'alert-danger' : 'alert-warning'">
                <span th:if="${w.severity == 'DANGER'}">&#x1F534; </span>
                <span th:if="${w.severity != 'DANGER'}">&#x1F7E1; </span>
                <strong th:text="${w.name}"></strong>
                当前占比 <strong th:text="${w.pct} + '%'"></strong>
                <span th:if="${w.severity == 'DANGER'}"> — 超过50%，集中度极高，建议分散</span>
                <span th:if="${w.severity == 'WARNING'}"> — 超过30%，注意集中度风险</span>
                <span th:if="${w.severity == 'OVERWEIGHT'}"> — 超出目标配置20%以上，存在超配风险</span>
            </div>
        </div>
    </div>
</div>

<script th:inline="javascript">
    const items = /*[[${allocationComparison}]]*/ [];
    new Chart(document.getElementById('allocChart'), {
        type: 'bar',
        data: {
            labels: items.map(i => i.type),
            datasets: [
                { label: '目标占比 %', data: items.map(i => parseFloat(i.target)), backgroundColor: 'rgba(21,101,192,0.7)' },
                { label: '当前占比 %', data: items.map(i => parseFloat(i.current)), backgroundColor: 'rgba(230,81,0,0.7)' }
            ]
        },
        options: {
            responsive: true,
            plugins: { legend: { position: 'top' } },
            scales: { y: { beginAtZero: true, max: 100, ticks: { callback: v => v + '%' } } }
        }
    });
</script>
</body>
</html>
