<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI分析历史 - 资产管理助手</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { font-family: Arial, sans-serif; background-color: #f8f9fa; }
        .sidebar { background-color: #343a40; color: white; min-height: 100vh; }
        .sidebar a { color: white; text-decoration: none; display: block; padding: 10px 15px; }
        .sidebar a:hover { background-color: #495057; }
        .sidebar .active { background-color: #007bff; }
        .content { padding: 20px; }

        .record-card {
            border: 1px solid #e9ecef;
            border-radius: 10px;
            padding: 16px 20px;
            margin-bottom: 12px;
            background: #fff;
            transition: box-shadow 0.15s;
            cursor: pointer;
            text-decoration: none;
            display: block;
            color: inherit;
        }
        .record-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.1); color: inherit; }

        .type-badge {
            font-size: 0.72rem;
            padding: 3px 10px;
            border-radius: 20px;
            font-weight: 600;
        }
        .type-PORTFOLIO      { background: #dbeafe; color: #1d4ed8; }
        .type-STOCK          { background: #d1fae5; color: #065f46; }
        .type-NEWS           { background: #fef3c7; color: #92400e; }
        .type-NEWS_KEYWORD   { background: #ede9fe; color: #5b21b6; }

        .record-meta { font-size: 0.82rem; color: #6c757d; }
        .record-subject { font-weight: 600; font-size: 1rem; margin-top: 4px; }
        .duration-badge { font-size: 0.75rem; color: #9ca3af; }

        .filter-btn { border-radius: 20px; font-size: 0.82rem; }
        .filter-btn.active { background: #0d6efd; color: #fff; border-color: #0d6efd; }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <!-- 侧边栏 -->
        <div class="col-md-2 sidebar">
            <h5 class="p-3">资产管理助手</h5>
            <a href="/dashboard">仪表盘</a>
            <a href="/assets">资产配置</a>
            <a href="/dca">定投计划</a>
    <a href="/goals">投资目标</a>
            <a href="/stocks">股票/基金</a>
            <a href="/warnings">预警管理</a>
            <a href="/news">财经新闻</a>
            <a href="/ai-advice" class="active">AI投资建议</a>
            <a href="/logout">退出登录</a>
        </div>

        <!-- 主内容 -->
        <div class="col-md-10 content">
            <div class="mt-4">
                <!-- 标题栏 -->
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <div>
                        <a href="/ai-advice" class="text-decoration-none text-secondary me-2">← 返回AI建议</a>
                        <h4 class="d-inline">🤖 AI分析历史记录</h4>
                    </div>
                    <span class="text-muted" th:text="'共 ' + ${total} + ' 条记录'"></span>
                </div>

                <!-- 类型过滤按钮 -->
                <div class="mb-3" id="filterBar">
                    <button class="btn btn-outline-secondary filter-btn active me-1" data-type="ALL">全部</button>
                    <button class="btn btn-outline-primary filter-btn me-1" data-type="PORTFOLIO">整体持仓</button>
                    <button class="btn btn-outline-success filter-btn me-1" data-type="STOCK">单股分析</button>
                    <button class="btn btn-outline-warning filter-btn me-1" data-type="NEWS">新闻解读</button>
                    <button class="btn btn-outline-secondary filter-btn" data-type="NEWS_KEYWORD">关键词情绪</button>
                </div>

                <!-- 空状态 -->
                <div th:if="${records == null or records.empty}"
                     class="text-center py-5 text-muted">
                    <div style="font-size:3rem">🤖</div>
                    <p class="mt-2">暂无AI分析记录</p>
                    <a href="/ai-advice" class="btn btn-primary btn-sm">去生成AI建议</a>
                </div>

                <!-- 记录列表 -->
                <div id="recordList" th:if="${records != null and !records.empty}">
                    <a th:each="r : ${records}"
                       th:href="@{/ai-advice/history/{id}(id=${r.id})}"
                       class="record-card"
                       th:attr="data-type=${r.type}">
                        <div class="d-flex justify-content-between align-items-start">
                            <div>
                                <span class="type-badge"
                                      th:classappend="'type-' + ${r.type}"
                                      th:text="${r.type == 'PORTFOLIO'} ? '整体持仓' :
                                               (${r.type == 'STOCK'} ? '单股分析' :
                                               (${r.type == 'NEWS'} ? '新闻解读' : '关键词情绪'))">
                                </span>
                                <div class="record-subject" th:text="${r.subject}"></div>
                                <div class="record-meta" th:text="${#dates.format(r.createdAt, 'yyyy-MM-dd HH:mm')}"></div>
                            </div>
                            <div class="text-end">
                                <span class="duration-badge"
                                      th:if="${r.durationMs != null}"
                                      th:text="'⏱ ' + ${#numbers.formatDecimal(r.durationMs / 1000.0, 1, 1)} + 's'">
                                </span>
                                <div class="text-muted mt-1" style="font-size:0.8rem">查看详情 →</div>
                            </div>
                        </div>
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // 类型过滤
    document.getElementById('filterBar').addEventListener('click', function(e) {
        const btn = e.target.closest('.filter-btn');
        if (!btn) return;

        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        const type = btn.dataset.type;
        document.querySelectorAll('#recordList .record-card').forEach(card => {
            card.style.display = (type === 'ALL' || card.dataset.type === type) ? 'block' : 'none';
        });
    });
</script>
</body>
</html>
