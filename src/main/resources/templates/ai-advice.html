<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 投资建议 - 资产管理助手</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f8f9fa; }
        .sidebar {
            background-color: #343a40; color: white;
            height: 100vh; position: fixed;
            top: 0; left: 0; width: 210px; padding-top: 20px;
        }
        .sidebar a { color: white; padding: 10px 15px; display: block; text-decoration: none; }
        .sidebar a:hover { background-color: #495057; }
        .sidebar a.active { background-color: #0d6efd; }
        .content { margin-left: 210px; padding: 24px; }

        /* Loading */
        .loading-wrapper {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 60px 20px; color: #6c757d;
        }
        .spinner-ring {
            width: 56px; height: 56px;
            border: 5px solid #e0e0e0; border-top-color: #0d6efd;
            border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .typing-dots span {
            display: inline-block; width: 8px; height: 8px;
            border-radius: 50%; background: #0d6efd;
            margin: 0 3px; animation: bounce 1.2s infinite;
        }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-10px)} }

        /* Markdown */
        #advice-content h1 { font-size:1.5rem; border-bottom:2px solid #0d6efd; padding-bottom:8px; margin-bottom:16px; }
        #advice-content h2 { font-size:1.25rem; color:#0d6efd; margin-top:24px; margin-bottom:12px; }
        #advice-content h3 { font-size:1.1rem; margin-top:16px; }
        #advice-content ul  { padding-left:1.5rem; }
        #advice-content li  { margin-bottom:6px; line-height:1.7; }
        #advice-content p   { line-height:1.8; }
        #advice-content strong { color:#212529; }
        #advice-content blockquote {
            border-left:4px solid #ffc107; background:#fff8e1;
            padding:10px 16px; margin:12px 0; border-radius:4px;
        }
        #advice-content code { background:#f1f3f5; padding:2px 6px; border-radius:3px; }
        #advice-content table { width:100%; border-collapse:collapse; margin:12px 0; font-size:0.9rem; }
        #advice-content th { background:#f1f3f5; padding:8px; border:1px solid #dee2e6; }
        #advice-content td { padding:7px 8px; border:1px solid #dee2e6; }
        #advice-content tr:nth-child(even) td { background:#fafafa; }

        /* 错误 */
        .error-box { background:#fff3cd; border:1px solid #ffc107; border-radius:8px; padding:20px; }

        /* ===== 风险仪表盘 ===== */
        #risk-dashboard { display:none; }
        .risk-gauge-wrap {
            position: relative; width: 130px; height: 70px;
            margin: 0 auto 8px;
        }
        .risk-gauge-bg {
            position: absolute; top: 0; left: 0;
            width: 130px; height: 65px;
            border-radius: 65px 65px 0 0;
            background: conic-gradient(
                #198754 0deg 72deg,
                #ffc107 72deg 144deg,
                #fd7e14 144deg 216deg,
                #dc3545 216deg 288deg,
                #6f42c1 288deg 360deg
            );
            clip-path: ellipse(65px 65px at 65px 65px);
            overflow: hidden;
        }
        .risk-needle {
            position: absolute; bottom: 0; left: 65px;
            width: 2px; height: 58px;
            background: #212529;
            transform-origin: bottom center;
            transform: rotate(-90deg);
            transition: transform 1.2s cubic-bezier(.34,1.56,.64,1);
            border-radius: 2px;
        }
        .risk-score-label {
            font-size: 1.6rem; font-weight: 700; line-height: 1;
        }
        .risk-badge {
            font-size: 0.75rem; padding: 3px 10px; border-radius: 12px;
            font-weight: 600; color: white;
        }
        .sub-risk-item { text-align: center; }
        .sub-risk-label { font-size: 0.7rem; color: #6c757d; }
        .sub-risk-val {
            font-size: 0.78rem; font-weight: 700;
            padding: 2px 8px; border-radius: 8px; color: white;
        }
        .rv-low  { background: #198754; }
        .rv-mid  { background: #ffc107; color:#000 !important; }
        .rv-high { background: #dc3545; }
    </style>
</head>
<body>
<div class="sidebar">
    <h5 class="text-center mb-4">资产管理助手</h5>
    <a href="/dashboard">仪表盘</a>
    <a href="/assets">资产配置</a>
    <a href="/dca">定投计划</a>
    <a href="/goals">投资目标</a>
    <a href="/stocks">股票/基金</a>
    <a href="/warnings">预警管理</a>
    <a href="/news">财经新闻</a>
    <a href="/ai-advice" class="active">AI 投资建议</a>
    <a href="/logout">退出登录</a>
</div>

<div class="content">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4>🤖 AI 投资分析报告</h4>
        <div class="d-flex gap-2">
            <a href="/ai-advice/history" class="btn btn-outline-secondary btn-sm">📋 历史记录</a>
            <button id="refresh-btn" class="btn btn-outline-primary btn-sm" onclick="loadAdvice()">
                🔄 重新生成
            </button>
        </div>
    </div>

    <!-- 风险仪表盘（AI 返回后渲染） -->
    <div id="risk-dashboard" class="card shadow-sm mb-4">
        <div class="card-header bg-dark text-white d-flex justify-content-between">
            <strong>⚠️ 组合风险评估</strong>
            <span id="risk-top-hint" class="small opacity-75"></span>
        </div>
        <div class="card-body py-3">
            <div class="row align-items-center">
                <!-- 仪表盘指针 -->
                <div class="col-md-3 text-center border-end">
                    <div class="risk-gauge-wrap">
                        <div class="risk-gauge-bg"></div>
                        <div class="risk-needle" id="risk-needle"></div>
                    </div>
                    <div id="risk-score-label" class="risk-score-label mt-1">--</div>
                    <span id="risk-level-badge" class="risk-badge bg-secondary mt-1 d-inline-block">评估中</span>
                    <div class="text-muted small mt-1">综合风险评分（0~100）</div>
                </div>
                <!-- 三项子风险 -->
                <div class="col-md-9">
                    <div class="row text-center">
                        <div class="col-4 sub-risk-item">
                            <div class="sub-risk-label mb-1">仓位风险</div>
                            <span id="r-position" class="sub-risk-val bg-secondary">-</span>
                        </div>
                        <div class="col-4 sub-risk-item">
                            <div class="sub-risk-label mb-1">集中度风险</div>
                            <span id="r-concentration" class="sub-risk-val bg-secondary">-</span>
                        </div>
                        <div class="col-4 sub-risk-item">
                            <div class="sub-risk-label mb-1">市场风险</div>
                            <span id="r-market" class="sub-risk-val bg-secondary">-</span>
                        </div>
                    </div>
                    <div id="risk-top-risk-bar" class="mt-3 px-3">
                        <div class="text-muted small mb-1">主要风险点：</div>
                        <div id="risk-top-risk-text" class="fw-bold text-danger small"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 分析主体 -->
    <div class="card shadow-sm">
        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
            <span>智能投资分析（由 DeepSeek AI 驱动）</span>
            <small id="gen-time" class="opacity-75"></small>
        </div>
        <div class="card-body">
            <!-- Loading -->
            <div id="loading-state" class="loading-wrapper">
                <div class="spinner-ring"></div>
                <p class="mb-2 fw-bold">AI 正在分析您的持仓与市场数据...</p>
                <p class="small text-muted mb-3">综合持仓、行情、新闻、预警状态，生成量化建议报告</p>
                <div class="typing-dots"><span></span><span></span><span></span></div>
            </div>
            <!-- 正文 -->
            <div id="advice-content" style="display:none;"></div>
            <!-- 错误 -->
            <div id="error-state" class="error-box" style="display:none;">
                <h6>⚠️ 分析生成失败</h6>
                <p id="error-msg" class="mb-2 small"></p>
                <button class="btn btn-warning btn-sm" onclick="loadAdvice()">重试</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    window.onload = function () { loadAdvice(); };

    function loadAdvice() {
        const loading  = document.getElementById('loading-state');
        const content  = document.getElementById('advice-content');
        const errorBox = document.getElementById('error-state');
        const genTime  = document.getElementById('gen-time');
        const btn      = document.getElementById('refresh-btn');
        const dashboard = document.getElementById('risk-dashboard');

        loading.style.display = 'flex';
        content.style.display = 'none';
        errorBox.style.display = 'none';
        dashboard.style.display = 'none';
        btn.disabled = true;
        btn.textContent = '⏳ 分析中...';
        genTime.textContent = '';

        const startTime = Date.now();

        fetch('/api/ai-advice')
            .then(res => {
                if (!res.ok) throw new Error('服务器返回 ' + res.status);
                return res.text();
            })
            .then(raw => {
                // ===== 1. 提取并删除 JSON block =====
                const jsonMatch = raw.match(/```json\s*(\{[\s\S]*?\})\s*```/);
                let markdown = raw;
                if (jsonMatch) {
                    markdown = raw.replace(jsonMatch[0], '').trim();
                    try {
                        const risk = JSON.parse(jsonMatch[1]);
                        renderRiskDashboard(risk);
                    } catch (e) {
                        console.warn('风险JSON解析失败', e);
                    }
                }

                // ===== 2. 渲染 Markdown 正文 =====
                content.innerHTML = marked.parse(markdown);

                const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
                genTime.textContent = '生成耗时 ' + elapsed + 's';

                loading.style.display = 'none';
                content.style.display = 'block';
                btn.disabled = false;
                btn.textContent = '🔄 重新生成';
            })
            .catch(err => {
                loading.style.display = 'none';
                document.getElementById('error-msg').textContent = err.message;
                errorBox.style.display = 'block';
                btn.disabled = false;
                btn.textContent = '🔄 重新生成';
            });
    }

    // ===== 渲染风险仪表盘 =====
    function renderRiskDashboard(risk) {
        const score = Math.max(0, Math.min(100, risk.riskScore || 50));

        // 指针旋转：0分→-90deg，50分→0deg，100分→90deg
        const deg = (score / 100) * 180 - 90;
        document.getElementById('risk-needle').style.transform = 'rotate(' + deg + 'deg)';
        document.getElementById('risk-score-label').textContent = score;

        // 等级颜色
        const levelColors = { '极低':'#198754','低':'#20c997','中等':'#ffc107','高':'#fd7e14','极高':'#dc3545' };
        const level = risk.riskLevel || '中等';
        const badge = document.getElementById('risk-level-badge');
        badge.textContent = level;
        badge.style.background = levelColors[level] || '#6c757d';

        // 三项子风险
        setSubRisk('r-position',      risk.positionRisk);
        setSubRisk('r-concentration', risk.concentrationRisk);
        setSubRisk('r-market',        risk.marketRisk);

        // 主要风险点
        if (risk.topRisk) {
            document.getElementById('risk-top-risk-text').textContent = risk.topRisk;
        }
        document.getElementById('risk-top-hint').textContent = '上次分析：' + new Date().toLocaleTimeString();
        document.getElementById('risk-dashboard').style.display = 'block';
    }

    function setSubRisk(elemId, val) {
        const el = document.getElementById(elemId);
        if (!el) return;
        el.textContent = val || '-';
        el.className = 'sub-risk-val ' +
            (val === '高' ? 'rv-high' : val === '中' ? 'rv-mid' : 'rv-low');
    }
</script>
</body>
</html>
