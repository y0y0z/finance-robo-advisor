# ============================================================
#  应用基本配置
# ============================================================
spring.application.name=finance
server.port=${SERVER_PORT:8080}
server.servlet.session.timeout=${SESSION_TIMEOUT:2h}

# ============================================================
#  数据源（敏感信息建议通过环境变量注入）
# ============================================================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/finance?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:123456}

# ============================================================
#  JPA / Hibernate
# ============================================================
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.open-in-view=false

# ============================================================
#  日志级别
# ============================================================
logging.level.root=INFO
logging.level.org.example.finance=INFO
logging.level.org.springframework.web=INFO

# ============================================================
#  DeepSeek AI API（API Key 必须通过环境变量 DEEPSEEK_API_KEY 注入）
# ============================================================
deepseek.api.key=${DEEPSEEK_API_KEY:sk-08a6c4e3c29244699eb19f4e5f8b049c}
deepseek.api.url=${DEEPSEEK_API_URL:https://api.deepseek.com/chat/completions}
deepseek.api.model=${DEEPSEEK_API_MODEL:deepseek-chat}
deepseek.api.timeout=${DEEPSEEK_API_TIMEOUT:60}

# ============================================================
#  QQ 邮箱 SMTP（password 是授权码，不是 QQ 密码）
#  开启路径：QQ邮箱 → 设置 → 账号 → 开启SMTP服务
# ============================================================
spring.mail.host=smtp.qq.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.default-encoding=UTF-8

# 预警邮件发件人
warning.email.from=${MAIL_USERNAME:}

# ============================================================
#  调度任务参数（毫秒数 / cron 表达式，便于不同环境调整）
# ============================================================
# 资产价格更新
schedule.asset-price.fixed-rate=300000
schedule.asset-price.initial-delay=10000

# 股票/基金价格更新
schedule.stock-price.fixed-rate=300000

# 净值快照（次日 09:30 记录，此时基金 T+1 净值已全部确认）
schedule.net-value-snapshot.cron=0 30 9 * * *

# 关键词新闻抓取
schedule.news-keyword-fetch.fixed-rate=1800000
schedule.news-keyword-fetch.initial-delay=60000

# 智能预警
schedule.smart-warning.fixed-rate=1800000
schedule.smart-warning.initial-delay=300000

# 预警检测
schedule.warning-check.fixed-rate=60000
schedule.warning-check.initial-delay=30000

# 市场情绪刷新
schedule.market-sentiment.fixed-rate=300000
schedule.market-sentiment.initial-delay=15000

# 定投自动执行
schedule.dca.evening-cron=0 30 21 * * *
schedule.dca.morning-cron=0 0 9 * * *

spring.data.redis.database=0
spring.data.redis.host=localhost
spring.data.redis.port=6379
#spring.data.redis.password=
spring.data.redis.timeout=60000